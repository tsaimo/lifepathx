name: CI

on:
  push:
  pull_request:

# CI 只需要读取仓库内容，不授予写入权限。
permissions:
  contents: read

# 同一分支有新提交时取消旧运行，避免浪费执行时间。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # npm ci 严格按锁文件安装，锁文件与清单不一致时会直接失败。
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build production assets
        run: npm run build
